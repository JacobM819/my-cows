services:
  my-cows-api:
    build: ./server
    container_name: my-cows-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/app/data/scores.sqlite
    volumes:
      - ./data:/app/data

  my-cows-ui:
    build: .
    container_name: my-cows-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - my-cows-api
